<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日历</title>
    <style>
      html,body{
        width:100%;
        height:100%;
      }
    
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    </style>
      <link rel="manifest" href="manifest.json">
        <script>
    // 注册Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</head>
<body>
<style>
* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动按钮文字，提升美感 */
        }

.calendar-nav {
  display: flex;
  justify-content: space-between; /* 两个按钮左右两端对齐 */
  align-items: center;
  gap: 1rem;          /* 按钮之间的最小间距，防止靠太近 */
  padding: 0.5rem 0;
  margin-bottom: 1.5rem;
}

/* 通用按钮样式 */
.calendar-nav button {
  background-color: #f0f0f0;      /* 浅灰背景 */
  border: 1px solid #d1d5db;       /* 柔和边框 */
  padding: 0.5rem 1.2rem;
  font-size: 1rem;
  font-weight: 500;
  color: #374151;
  border-radius: 2rem;             /* 胶囊圆角，也可改为 0.5rem 更方正 */
  cursor: pointer;
  transition: all 0.2s ease;
  min-width: 80px;                 /* 保证两个按钮宽度协调 */
  text-align: center;
}

/* 悬停效果 */
.calendar-nav button:hover {
  background-color: #e5e7eb;
  border-color: #9ca3af;
  transform: translateY(-1px);
}

/* 点击效果 */
.calendar-nav button:active {
  transform: translateY(1px);
}

  
</style>
<div>
  <color-picker-menu></color-picker-menu>
  
  <div>
    <calendar-header id="header"></calendar-header>
    <calendar-weekdays></calendar-weekdays>
    <calendar-dates id="dates"></calendar-dates>
  </div>
  <div class="calendar-nav">
    <button id="prev">上月</button>
    <button id="next">下月</button>
  </div>
</div>
<script type="module">
  import "./color.js";
  import "./first.js";import "./date.js";
  let year = new Date().getFullYear();
  let month = new Date().getMonth();
  const con=[document.querySelector('calendar-header'),document.querySelector('calendar-dates')]
  function update(obj,year,month){
for (const i of obj ){
  i.setDate(year,month);
}
  }
  const prev=document.getElementById('prev');
  const next=document.getElementById('next');
  prev.addEventListener('click',()=>{
if (month==0){
  year-=1;month=11;
}
else{month-=1;}
update(con,year,month);
  })
    next.addEventListener('click',()=>{
if (month==11){
  year+=1;month=0;
}
else{month+=1;}
update(con,year,month);
  })

</script>

</body>
</html>
