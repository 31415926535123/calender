<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="manifest.json" />
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script src="./tailwindcss.js"></script>
    <script type="importmap">
      {
        "imports": {
          "vue": "./vue.js"
        }
      }
    </script>
    <script type="module">
      // 在现有的 import 后面添加
      import ImageUploader from "./avatar.js";
      import longpressDirective from "./longpress.js";
      import { LargeEditorModal, CalendarMarker } from "./utils.js";
      import { CalendarCell } from "./calendarcell.js";
      import { storage } from "./store.js";
      import { createApp, ref, computed, watch } from "vue";
      import { BottomDrawer } from "./bottomdrawer.js";
      const app = createApp({
        setup() {
          const showAvatarUploader = ref(false);

          // 切换头像上传器显示/隐藏
          const toggleAvatarUploader = () => {
            showAvatarUploader.value = !showAvatarUploader.value;
          };

          // 处理头像上传成功
          const handleAvatarUploaded = (imageData) => {
            showAvatarUploader.value = false;
            console.log("头像更新成功", imageData);
          };
          const year = ref(new Date().getFullYear());
          const month = ref(new Date().getMonth());
          const weekName = [
            "周日",
            "周一",
            "周二",
            "周三",
            "周四",
            "周五",
            "周六",
          ];
          const markers = storage.createDynamicStorage(
            () => `main_markers_${year.value}_${month.value}`,
            {},
          );
          const firstDay = computed(() => {
            console.log(markers.value);
            return new Date(year.value, month.value, 1).getDay();
          });
          const days = computed(() => {
            return new Date(year.value, month.value + 1, 0).getDate();
          });

          const drawerVisible = ref(false);
          const currentDay = ref(null);
          const openDrawer = (day) => {
            currentDay.value = day; // 记录点击的日期
            drawerVisible.value = true; // 显示抽屉
          };

          const closeDrawer = () => {
            drawerVisible.value = false; // 隐藏抽屉
            currentDay.value = null; // 清空记录的日期
          };
          const selectMarker = (markerData) => {
            if (markers.value[markerData.day]?.length >= 4) {
              alert("超过可选上限");
              return;
            }
            const newMarkers = { ...markers.value };
            // 如果同一天已有标记，则追加到数组
            if (newMarkers[markerData.day]) {
              newMarkers[markerData.day] = [
                ...newMarkers[markerData.day],
                {
                  type: markerData.type,
                  color: markerData.color,
                },
              ];
            } else {
              newMarkers[markerData.day] = [
                {
                  type: markerData.type,
                  color: markerData.color,
                },
              ];
            }
            markers.value = newMarkers;
          };
          const handleUpdateMarkers = (newMarkers) => {
            // 接收删除后的新数据
            markers.value = newMarkers;
          };
          return {
            year,
            month,
            days,
            firstDay,
            weekName,
            markers,
            drawerVisible,
            currentDay,
            openDrawer,
            closeDrawer,
            selectMarker,
            handleUpdateMarkers,
            showAvatarUploader,
            toggleAvatarUploader,
            handleAvatarUploaded,
          };
        },
        components: { CalendarCell, BottomDrawer, ImageUploader },
        template: `
        <!-- 右上角圆形头像 -->
<div class="fixed top-4 right-4 z-50">
  <div @click="toggleAvatarUploader" class="cursor-pointer">
    <ImageUploader 
      :show-upload-area="false"
      :show-info-panel="false"
      :show-delete-button="false"
      :size="50"
      position="custom"
      :custom-position="{ top: '0px', right: '0px' }"
      @uploaded="handleAvatarUploaded"
    />
  </div>
</div>

<!-- 头像切换弹窗（可选，显示完整上传界面） -->
<div v-if="showAvatarUploader" 
     class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center"
     @click="showAvatarUploader = false">
  <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4" @click.stop>
    <h3 class="text-xl font-bold mb-4 text-center">更换头像</h3>
    <ImageUploader 
      :show-upload-area="true"
      :show-info-panel="true"
      :show-delete-button="true"
      :size="80"
      position="custom"
      :custom-position="{ position: 'relative', top: '0', left: '0' }"
      @uploaded="handleAvatarUploaded"
      @deleted="handleAvatarUploaded"
    />
    <button class="mt-4 w-full px-4 py-2 bg-gray-200 rounded-lg" @click="showAvatarUploader = false">
      取消
    </button>
  </div>
</div>
        
        <div class="text-center text-4xl flex items-center justify-center gap-8 mb-16 mt-16">
  <button 
    @click="month--; if(month < 0) { month = 11; year--; }"
    class="w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 active:bg-gray-300 transition-colors text-2xl font-bold"
  >
    ←
  </button>
  <span>{{year}}年{{month + 1}}月</span>
  <button 
    @click="month++; if(month > 11) { month = 0; year++; }"
    class="w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 active:bg-gray-300 transition-colors text-2xl font-bold"
  >
    →
  </button>
</div>
        <div class="grid grid-cols-7 gap-1">
          <div v-for ="i in weekName" :key="i" class="text-center">
            {{i}}
            </div>

        <div v-for="i in firstDay" :key="i">
          </div>

          <template v-for="i in days" :key="i">
        <CalendarCell 
  :day="i" 
  :year="year" 
  :month="month"
  :markers="markers[i]"
  @open-drawer="openDrawer"
/></template>
        </div>
        <BottomDrawer 
      :visible="drawerVisible"
      :current-day="currentDay"
      :markers=markers
      @close="closeDrawer"
      @select="selectMarker"
          @update:markers="handleUpdateMarkers"
    />
        `,
      });
      app.directive("longpress", longpressDirective);
      app.mount("#app");
    </script>
  </body>
</html>
